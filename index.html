<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Caption Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-container">
        <header>
            <h1>Rhythm <span class="gradient-text">Captions</span></h1>
            <p>Upload audio, sync the beat, and download transparent caption videos.</p>
        </header>

        <main class="app-body">
            <div class="drop-zone" id="dropZone">
                <input type="file" id="audioUpload" accept="audio/*, video/*" hidden>
                <div class="drop-zone-content">
                    <div class="upload-icon">🎵</div>
                    <p>Tap to <span>Browse File</span></p>
                    <small>Supports any MP3, Audio or MP4 track</small>
                </div>
            </div>

            <div class="controls-card hidden" id="controlsCard">
                <div class="file-badge">
                    <span id="fileInfo">Filename.mp3</span>
                    <button id="btnReset" class="close-badge" title="Remove file">&times;</button>
                </div>
                
                <div class="settings-grid">
                    <div class="setting-item">
                        <label for="bgType">Background Mode</label>
                        <select id="bgType">
                            <option value="transparent">Transparent (WebM - for PC editors)</option>
                            <option value="green">Chroma Green Screen (MP4 - for Mobile/CapCut)</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="captionText">Enter Captions (Comma Separated)</label>
                        <textarea id="captionText" placeholder="Word, by, word, caption, sync, test..."></textarea>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="btnPlay" class="btn btn-secondary">Play Preview</button>
                    <button id="btnRender" class="btn btn-primary">Generate & Download</button>
                </div>
            </div>

            <div class="preview-box hidden" id="previewBox">
                <canvas id="videoCanvas" width="1080" height="1920"></canvas>
            </div>
        </main>
    </div>

    <footer>
        <p>Web Developer: <span class="dev-name">Debangsh bio-wala</span></p>
        <p class="funny-content">nahi mila ga 🤣</p>
        <p class="support-text">Support developer by giving him a girlfriend</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
